<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>m.murdock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap');

    :root {
      --ink: #0f0e0d;
      --gray-900: #1f1d1a;
      --gray-800: #33312c;
      --gray-700: #524f49;
      --gray-600: #706d66;
      --gray-500: #8f8b85;
      --gray-400: #adaba5;
      --gray-300: #cccac6;
      --gray-200: #e5e5e3;
      --gray-100: #f2f1f0;
      --ivory: #fafaf9;
      --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--ink);
      color: var(--ivory);
      height: 100vh;
      overflow: hidden;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      background: var(--ink);
      border-right: 1px solid var(--gray-800);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--gray-800);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ivory);
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--gray-600);
      margin-top: 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .new-chat-btn {
      margin: 16px 20px 8px;
      padding: 0 16px;
      height: 40px;
      background: var(--ivory);
      color: var(--ink);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .new-chat-btn:hover { background: var(--gray-300); }

    .conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .conversations::-webkit-scrollbar { width: 4px; }
    .conversations::-webkit-scrollbar-track { background: transparent; }
    .conversations::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }

    .conv-item {
      padding: 8px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.1s;
    }

    .conv-item .conv-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item:hover { background: var(--gray-900); color: var(--gray-300); }
    .conv-item.active { background: var(--gray-900); color: var(--ivory); }

    .conv-item .conv-delete {
      display: none;
      background: none;
      border: none;
      color: var(--gray-700);
      cursor: pointer;
      padding: 0 2px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .conv-item:hover .conv-delete { display: block; }
    .conv-item .conv-delete:hover { color: var(--gray-400); }

    .conv-date {
      padding: 8px 12px 4px;
      font-size: 10px;
      color: var(--gray-700);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--gray-800);
      font-size: 11px;
      color: var(--gray-700);
      line-height: 1.5;
    }

    .sidebar-footer a {
      color: var(--gray-500);
      text-decoration: none;
      transition: color 0.15s;
    }
    .sidebar-footer a:hover { color: var(--ivory); }

    /* ── Main ─────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--gray-900);
    }

    .main-header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--gray-800);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--ink);
    }

    .main-header h2 {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--gray-500);
      letter-spacing: 0.01em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a9;
      display: inline-block;
    }

    .status-text {
      font-size: 11px;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Messages ─────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gray-800); border-radius: 2px; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 20px;
    }

    .welcome h1 {
      font-family: var(--font-serif);
      font-size: 48px;
      font-weight: 400;
      color: var(--ivory);
      letter-spacing: -0.025em;
      line-height: 1.1;
    }

    .welcome p {
      font-size: 15px;
      color: var(--gray-500);
      max-width: 440px;
      line-height: 1.6;
    }

    .welcome-examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 560px;
      margin-top: 12px;
    }

    .example-btn {
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--gray-800);
      border-radius: var(--radius);
      color: var(--gray-400);
      font-family: var(--font-sans);
      font-size: 12.5px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.45;
    }

    .example-btn:hover {
      border-color: var(--gray-700);
      color: var(--ivory);
      background: var(--ink);
    }

    .msg {
      max-width: 760px;
      margin: 0 auto 28px;
      display: flex;
      gap: 16px;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .msg.user .msg-avatar { background: var(--gray-800); color: var(--gray-400); }
    .msg.assistant .msg-avatar { background: var(--ivory); color: var(--ink); }

    .msg-body { flex: 1; min-width: 0; }

    .msg-name {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--gray-400);
      letter-spacing: 0.02em;
    }

    .msg-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--gray-200);
      word-break: break-word;
    }

    .msg-content p { margin-bottom: 12px; }
    .msg-content p:last-child { margin-bottom: 0; }

    .msg-content code {
      background: var(--ink);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--gray-300);
    }

    .msg-content pre {
      background: var(--ink);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--gray-800);
      overflow-x: auto;
      margin: 12px 0;
    }

    .msg-content pre code { background: none; padding: 0; font-size: 12.5px; }

    .msg-content table {
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
      width: 100%;
    }

    .msg-content th, .msg-content td {
      border: 1px solid var(--gray-800);
      padding: 8px 14px;
      text-align: left;
    }

    .msg-content th {
      background: var(--ink);
      font-weight: 500;
      color: var(--gray-400);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .msg-content h1, .msg-content h2, .msg-content h3 {
      font-family: var(--font-serif);
      font-weight: 400;
      color: var(--ivory);
    }

    .msg-content h2 { font-size: 18px; margin: 20px 0 8px; }
    .msg-content h3 { font-size: 15px; margin: 16px 0 6px; }

    .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
    .msg-content li { margin: 4px 0; color: var(--gray-300); }

    .msg-content blockquote {
      border-left: 2px solid var(--gray-700);
      padding-left: 16px;
      color: var(--gray-500);
      margin: 12px 0;
      font-style: italic;
    }

    .msg-content strong { color: var(--ivory); font-weight: 600; }
    .msg-content a { color: var(--gray-300); text-decoration: underline; text-underline-offset: 2px; }
    .msg-content a:hover { color: var(--ivory); }

    .msg-meta {
      font-size: 11px;
      color: var(--gray-700);
      margin-top: 10px;
      font-family: var(--font-mono);
    }

    .typing-indicator {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 5px;
      height: 5px;
      background: var(--gray-600);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.25; }
      30% { opacity: 0.8; }
    }

    /* ── Input ────────────────────────────────────────────── */
    .input-area {
      padding: 16px 32px 28px;
      flex-shrink: 0;
      background: var(--gray-900);
    }

    .input-container {
      max-width: 760px;
      margin: 0 auto;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      background: var(--ink);
      border: 1px solid var(--gray-800);
      border-radius: 6px;
      padding: 14px 16px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within { border-color: var(--gray-600); }

    .input-box textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--ivory);
      font-family: var(--font-sans);
      font-size: 14px;
      resize: none;
      max-height: 180px;
      line-height: 1.5;
    }

    .input-box textarea::placeholder { color: var(--gray-700); }

    .send-btn {
      width: 32px;
      height: 32px;
      background: var(--ivory);
      border: none;
      border-radius: var(--radius);
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 10px;
      transition: background 0.15s;
    }

    .send-btn:hover { background: var(--gray-300); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: var(--gray-700);
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .messages { padding: 20px 16px; }
      .input-area { padding: 12px 16px 20px; }
      .welcome-examples { grid-template-columns: 1fr; }
      .welcome h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">m.murdock</div>
      <div class="logo-sub">Tax & Legal AI</div>
    </div>
    <button class="new-chat-btn" onclick="newConversation()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova consulta
    </button>
    <div class="conversations" id="convList"></div>
    <div class="sidebar-footer">
      Fontes oficiais gov.br<br>
      <a href="/docs" target="_blank">API</a> &middot; <a href="/api/sources" target="_blank">Fontes</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="main-header">
      <h2 id="headerTitle">Nova consulta</h2>
      <div class="status-text">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Conectado</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h1>m.murdock</h1>
        <p>Consultor tributário, contabil e fiscal brasileiro.
           Legislacao alimentada exclusivamente por fontes oficiais.</p>
        <div class="welcome-examples">
          <button class="example-btn" onclick="askExample(this)">Qual o melhor regime tributario para uma empresa de TI com faturamento de R$300k/mes?</button>
          <button class="example-btn" onclick="askExample(this)">Calcule a aliquota efetiva do Simples Nacional Anexo III para RBT12 de R$1.200.000</button>
          <button class="example-btn" onclick="askExample(this)">Como funciona o split payment da reforma tributaria em 2026?</button>
          <button class="example-btn" onclick="askExample(this)">Quais creditos de PIS/COFINS posso recuperar no Lucro Real?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <div class="input-box">
          <textarea id="userInput" placeholder="Descreva sua consulta..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter para enviar &middot; Shift+Enter nova linha</div>
      </div>
    </div>
  </main>

  <script>
    let conversationId = null;
    let isStreaming = false;
    let conversations = [];

    function renderMd(text) {
      let html = text
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/^\|(.+)\|$/gm, (match, content) => {
          const cells = content.split('|').map(c => c.trim());
          if (cells.every(c => /^[\-:]+$/.test(c))) return '';
          return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        });
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>');
      html = html.replace(/^(?!<[hupltbo]|<\/)(.*\S.*)$/gm, '<p>$1</p>');
      return html;
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function scrollToBottom() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    function addMessage(role, content, meta) {
      const w = document.getElementById('welcome');
      if (w) w.style.display = 'none';
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const av = role === 'user' ? 'Eu' : 'MM';
      const nm = role === 'user' ? 'Voce' : 'm.murdock';
      div.innerHTML = `
        <div class="msg-avatar">${av}</div>
        <div class="msg-body">
          <div class="msg-name">${nm}</div>
          <div class="msg-content">${role === 'user' ? `<p>${content}</p>` : renderMd(content)}</div>
          ${meta ? `<div class="msg-meta">${meta}</div>` : ''}
        </div>`;
      msgs.appendChild(div);
      scrollToBottom();
    }

    function addStreamMessage() {
      const w = document.getElementById('welcome');
      if (w) w.style.display = 'none';
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.id = 'streamMsg';
      div.innerHTML = `
        <div class="msg-avatar">MM</div>
        <div class="msg-body">
          <div class="msg-name">m.murdock</div>
          <div class="msg-content" id="streamContent">
            <div class="typing-indicator"><span></span><span></span><span></span></div>
          </div>
          <div class="msg-meta" id="streamMeta"></div>
        </div>`;
      msgs.appendChild(div);
      scrollToBottom();
    }

    function newConversation() {
      conversationId = null;
      document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <h1>m.murdock</h1>
          <p>Consultor tributario, contabil e fiscal brasileiro.
             Legislacao alimentada exclusivamente por fontes oficiais.</p>
          <div class="welcome-examples">
            <button class="example-btn" onclick="askExample(this)">Qual o melhor regime tributario para uma empresa de TI com faturamento de R$300k/mes?</button>
            <button class="example-btn" onclick="askExample(this)">Calcule a aliquota efetiva do Simples Nacional Anexo III para RBT12 de R$1.200.000</button>
            <button class="example-btn" onclick="askExample(this)">Como funciona o split payment da reforma tributaria em 2026?</button>
            <button class="example-btn" onclick="askExample(this)">Quais creditos de PIS/COFINS posso recuperar no Lucro Real?</button>
          </div>
        </div>`;
      document.getElementById('headerTitle').textContent = 'Nova consulta';
      updateConvList();
      document.getElementById('userInput').focus();
    }

    function askExample(btn) {
      document.getElementById('userInput').value = btn.textContent;
      sendMessage();
    }

    function updateConvList() {
      const list = document.getElementById('convList');
      if (!conversations.length) { list.innerHTML = ''; return; }

      // Agrupar por data
      const groups = {};
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();

      conversations.forEach(c => {
        const d = c.updated_at ? new Date(c.updated_at) : new Date();
        const ds = d.toDateString();
        const label = ds === today ? 'Hoje' : ds === yesterday ? 'Ontem' : d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
        if (!groups[label]) groups[label] = [];
        groups[label].push(c);
      });

      let html = '';
      for (const [label, items] of Object.entries(groups)) {
        html += `<div class="conv-date">${label}</div>`;
        items.forEach(c => {
          html += `<div class="conv-item ${c.id === conversationId ? 'active' : ''}" onclick="loadConv('${c.id}')">
            <span class="conv-title">${c.title || 'Sem título'}</span>
            <button class="conv-delete" onclick="event.stopPropagation();deleteConv('${c.id}')" title="Excluir">&times;</button>
          </div>`;
        });
      }
      list.innerHTML = html;
    }

    async function loadConversations() {
      try {
        const r = await fetch('/api/conversations');
        conversations = await r.json();
        updateConvList();
      } catch (e) { console.error('Erro ao carregar conversas:', e); }
    }

    async function loadConv(id) {
      if (isStreaming) return;
      conversationId = id;
      updateConvList();

      const msgs = document.getElementById('messages');
      const w = document.getElementById('welcome');
      if (w) w.style.display = 'none';
      msgs.innerHTML = '';

      try {
        const r = await fetch(`/api/conversations/${id}/messages`);
        const messages = await r.json();
        messages.forEach(m => {
          const meta = m.model_used ? `${m.model_used.replace('google-gla:','')} · ${m.latency_ms || 0}ms` : '';
          addMessage(m.role, m.content, m.role === 'assistant' ? meta : '');
        });

        const conv = conversations.find(c => c.id === id);
        document.getElementById('headerTitle').textContent = conv?.title || 'Consulta';
      } catch (e) { console.error('Erro ao carregar mensagens:', e); }
    }

    async function deleteConv(id) {
      try {
        await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
        conversations = conversations.filter(c => c.id !== id);
        if (conversationId === id) newConversation();
        updateConvList();
      } catch (e) { console.error('Erro ao deletar:', e); }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg || isStreaming) return;
      input.value = '';
      input.style.height = 'auto';
      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      addMessage('user', msg);
      addStreamMessage();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, conversation_id: conversationId, stream: true }),
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '', fullText = '', eventType = '';
        const contentEl = document.getElementById('streamContent');
        contentEl.innerHTML = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('event: ')) { eventType = line.slice(7).trim(); }
            else if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (eventType === 'token') {
                fullText += data;
                contentEl.innerHTML = renderMd(fullText);
                scrollToBottom();
              } else if (eventType === 'done') {
                try {
                  const info = JSON.parse(data);
                  conversationId = info.conversation_id;
                  const meta = document.getElementById('streamMeta');
                  if (meta) meta.textContent = `${info.model.replace('google-gla:','')} \u00b7 ${info.latency_ms}ms`;
                  document.getElementById('headerTitle').textContent = msg.slice(0, 55);
                  loadConversations();
                } catch (e) {}
              } else if (eventType === 'error') {
                contentEl.innerHTML = `<p style="color:var(--gray-400)">Erro: ${data}</p>`;
              }
            }
          }
        }
      } catch (err) {
        const c = document.getElementById('streamContent');
        if (c) c.innerHTML = `<p style="color:var(--gray-400)">Erro de conexao: ${err.message}</p>`;
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        ['streamMsg','streamContent','streamMeta'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.removeAttribute('id');
        });
      }
    }

    async function checkHealth() {
      try {
        const r = await fetch('/api/health');
        const d = await r.json();
        const dot = document.getElementById('statusDot');
        const label = document.getElementById('statusLabel');
        if (d.status === 'ok') {
          dot.style.background = '#4a9';
          label.textContent = `${d.knowledge_base?.total_chunks || 0} chunks`;
        }
      } catch (e) {
        document.getElementById('statusDot').style.background = '#a44';
        document.getElementById('statusLabel').textContent = 'Offline';
      }
    }

    document.getElementById('userInput').focus();
    checkHealth();
    loadConversations();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
