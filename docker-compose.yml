services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: murdock
      POSTGRES_PASSWORD: murdock
      POSTGRES_DB: murdock
    ports:
      - "5433:5432"
    volumes:
      - murdock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U murdock"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - murdock_redis:/data

  murdock:
    build: .
    ports:
      - "8010:8010"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://murdock:murdock@postgres:5432/murdock
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  murdock_pgdata:
  murdock_redis:
